site_name: 老鱼不吹浪的数字花间
site_description: 课程笔记 · 产品想法 · 生活随笔
site_author: 老鱼不吹浪
site_url: https://你的GitHub用户名.github.io/laoyubulang

theme:
  name: material
  language: zh
  #custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: deep purple
      accent: orange
  font:
    text: Noto Serif SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/sakura.js

nav:
  - 首页: index.md
  - 课程笔记:
    - 课程笔记/index.md
  - 产品想法:
    - 产品想法/index.md
  - 生活随笔:
    - 生活随笔/index.md

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
