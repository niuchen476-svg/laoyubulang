site_name: 老鱼不吹浪的数字花间
site_description: 课程笔记 · AI开发 · 技术日志
site_author: 老鱼不吹浪
site_url: https://laoyubulang.github.io/laoyubulang

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切换至暗色模式
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: 切换至亮色模式
  font:
    text: Noto Serif SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/sakura.js

nav:
  - 首页: index.md
  - 课程笔记:
      - 概览: 课程笔记/index.md
  - AI开发:
      - 概览: AI开发/index.md
  - 技术日志: changelog.md

plugins:
  - search:
      lang: zh
      separator: '[\s\u200b\-]+'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
