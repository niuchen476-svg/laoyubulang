name: 部署到 GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r portal/requirements.txt

      - name: 构建与整合
        run: |
          # 1. 编译 MkDocs
          cd portal
          mkdocs build
          
          # 2. 创建一个临时 site 文件夹用来存放最终要上传的所有东西
          cd ..
          mkdir -p final_site/portal
          
          # 3. 搬运工坊网页到 final_site/portal
          cp -r portal/site/* final_site/portal/
          
          # 4. 搬运根目录的大门和资源到 final_site 根目录
          cp index.html final_site/
          cp -r assets final_site/ || true
          cp -r css final_site/ || true
          cp -r js final_site/ || true

      - name: 上传所有零件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_site

      - name: 正式发布
        uses: actions/deploy-pages@v4